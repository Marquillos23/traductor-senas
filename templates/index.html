<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Traductor de Señas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            width: 100%;
            background: #1a1a2e;
            padding: 14px;
            text-align: center;
            border-bottom: 2px solid #00ff88;
        }
        header h1 { font-size: 1.3rem; color: #00ff88; letter-spacing: 2px; }
        header p { font-size: 0.75rem; color: #aaa; margin-top: 4px; }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            gap: 12px;
            width: 100%;
            max-width: 480px;
        }
        .camara-box {
            position: relative;
            border: 3px solid #00ff88;
            border-radius: 12px;
            overflow: hidden;
            width: 100%;
            box-shadow: 0 0 20px rgba(0,255,136,0.2);
        }
        canvas { width: 100%; display: block; }
        video { display: none; }
        .live-badge {
            position: absolute;
            top: 10px; left: 10px;
            background: red;
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .live-badge::before {
            content: '';
            width: 7px; height: 7px;
            background: white;
            border-radius: 50%;
            animation: parpadeo 1s infinite;
        }
        @keyframes parpadeo {
            0%, 100% { opacity: 1; } 50% { opacity: 0; }
        }
        .status {
            font-size: 0.75rem;
            color: #aaa;
            text-align: center;
        }
        .info-panel {
            width: 100%;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 14px;
            border: 1px solid #333;
        }
        .info-panel h2 { color: #00ff88; font-size: 0.85rem; margin-bottom: 10px; }
        .manos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mano-card {
            background: #0f0f0f;
            border-radius: 8px;
            padding: 10px;
            border: 1px solid #333;
            text-align: center;
        }
        .mano-card .lado { font-size: 0.7rem; color: #00bfff; margin-bottom: 5px; }
        .mano-card .seña { font-size: 1.2rem; font-weight: bold; }
        .mano-card .confianza { font-size: 0.7rem; color: #aaa; margin-top: 3px; }
        .barra { width: 100%; background: #333; border-radius: 10px; height: 5px; margin-top: 6px; }
        .barra-fill { height: 5px; background: #00ff88; border-radius: 10px; transition: width 0.3s; }
        footer { padding: 14px; color: #555; font-size: 0.7rem; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>TRADUCTOR DE SEÑAS</h1>
    <p>Detección en tiempo real con IA</p>
</header>

<div class="container">
    <div class="camara-box">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="live-badge">EN VIVO</div>
    </div>

    <p class="status" id="status">Cargando MediaPipe...</p>

    <div class="info-panel">
        <h2>📊 DETECCIÓN ACTUAL</h2>
        <div class="manos-grid">
            <div class="mano-card">
                <div class="lado">LEFT / IZQUIERDA 🤚</div>
                <div class="seña" id="seña-izq">—</div>
                <div class="confianza" id="conf-izq">Sin detección</div>
                <div class="barra"><div class="barra-fill" id="barra-izq" style="width:0%"></div></div>
            </div>
            <div class="mano-card">
                <div class="lado">RIGHT / DERECHA 🤚</div>
                <div class="seña" id="seña-der">—</div>
                <div class="confianza" id="conf-der">Sin detección</div>
                <div class="barra"><div class="barra-fill" id="barra-der" style="width:0%"></div></div>
            </div>
        </div>
    </div>
</div>

<footer>Proyecto de Titulación — Traductor LSM con IA</footer>

<!-- MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1620248257/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

let procesando = false;
let ultimoProceso = 0;
const INTERVALO_MS = 300;

const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
});

hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 0,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.5
});

hands.onResults(async (results) => {
    canvas.width = video.videoWidth || 320;
    canvas.height = video.videoHeight || 240;
    ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

    const ahora = Date.now();
    const payload = { izquierda: null, derecha: null };
    let hayManos = false;

    if (results.multiHandLandmarks && results.multiHandedness) {
        hayManos = true;
        for (let i = 0; i < results.multiHandLandmarks.length; i++) {
            const lm = results.multiHandLandmarks[i];
            const label = results.multiHandedness[i].label;

            drawConnectors(ctx, lm, HAND_CONNECTIONS, {color: '#00ff88', lineWidth: 2});
            drawLandmarks(ctx, lm, {color: '#ffffff', radius: 3});

            const w = canvas.width, h = canvas.height;
            const xs = lm.map(p => p.x * w);
            const ys = lm.map(p => p.y * h);
            const x1 = Math.max(0, Math.min(...xs) - 15);
            const y1 = Math.max(0, Math.min(...ys) - 15);
            const x2 = Math.min(w, Math.max(...xs) + 15);
            const y2 = Math.min(h, Math.max(...ys) + 15);
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 2;
            ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

            const flat = lm.flatMap(p => [p.x, p.y, p.z]);
            if (label === 'Left') payload.derecha = flat;
            else payload.izquierda = flat;
        }
    }

    status.textContent = hayManos ? '✅ Mano detectada' : '👀 Buscando manos...';

    if (!procesando && ahora - ultimoProceso > INTERVALO_MS && hayManos) {
        procesando = true;
        ultimoProceso = ahora;
        try {
            const res = await fetch('/predecir', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            actualizarPanel('izquierda', data.izquierda, payload.izquierda);
            actualizarPanel('derecha', data.derecha, payload.derecha);

            if (results.multiHandLandmarks) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const lm = results.multiHandLandmarks[i];
                    const label = results.multiHandedness[i].label;
                    const lado = label === 'Left' ? 'derecha' : 'izquierda';
                    const info = data[lado];
                    if (info) {
                        const w = canvas.width, h = canvas.height;
                        const xs = lm.map(p => p.x * w);
                        const ys = lm.map(p => p.y * h);
                        const x1 = Math.max(0, Math.min(...xs) - 15);
                        const y1 = Math.max(0, Math.min(...ys) - 15);
                        const texto = `${info.seña}: ${info.confianza}%`;
                        ctx.font = 'bold 14px Segoe UI';
                        const tw = ctx.measureText(texto).width;
                        ctx.fillStyle = '#00ff88';
                        ctx.fillRect(x1, y1 - 22, tw + 10, 20);
                        ctx.fillStyle = '#000';
                        ctx.fillText(texto, x1 + 5, y1 - 7);
                    }
                }
            }
        } catch(e) {
            status.textContent = '⚠️ Error: ' + e.message;
        }
        procesando = false;
    }
});

function actualizarPanel(lado, info, tieneData) {
    const sufijo = lado === 'izquierda' ? 'izq' : 'der';
    if (info) {
        document.getElementById(`seña-${sufijo}`).textContent = info.seña;
        document.getElementById(`conf-${sufijo}`).textContent = info.confianza + '%';
        document.getElementById(`barra-${sufijo}`).style.width = info.confianza + '%';
    } else if (!tieneData) {
        document.getElementById(`seña-${sufijo}`).textContent = '—';
        document.getElementById(`conf-${sufijo}`).textContent = 'Sin detección';
        document.getElementById(`barra-${sufijo}`).style.width = '0%';
    }
}

// Iniciar cámara sin usar Camera de MediaPipe
navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: {ideal: 320}, height: {ideal: 240} },
    audio: false
}).then(stream => {
    video.srcObject = stream;
    video.play();
    status.textContent = '👀 Buscando manos...';

    async function loop() {
        if (video.readyState >= 2) {
            await hands.send({image: video});
        }
        setTimeout(loop, INTERVALO_MS);
    }
    loop();
}).catch((err) => {
    status.textContent = '❌ Error: ' + err.name + ' - ' + err.message;
});
</script>

</body>
</html>

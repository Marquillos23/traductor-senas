<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor de Señas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            width: 100%;
            background: #1a1a2e;
            padding: 16px;
            text-align: center;
            border-bottom: 2px solid #00ff88;
        }
        header h1 { font-size: 1.5rem; color: #00ff88; letter-spacing: 2px; }
        header p { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            gap: 16px;
            width: 100%;
            max-width: 640px;
        }
        .camara-box {
            position: relative;
            border: 3px solid #00ff88;
            border-radius: 12px;
            overflow: hidden;
            width: 100%;
            box-shadow: 0 0 30px rgba(0,255,136,0.2);
        }
        canvas { width: 100%; display: block; }
        .live-badge {
            position: absolute;
            top: 12px; left: 12px;
            background: red;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .live-badge::before {
            content: '';
            width: 8px; height: 8px;
            background: white;
            border-radius: 50%;
            animation: parpadeo 1s infinite;
        }
        @keyframes parpadeo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .fps-control {
            width: 100%;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .fps-control label { font-size: 0.85rem; color: #aaa; white-space: nowrap; }
        .fps-control input { flex: 1; accent-color: #00ff88; }
        .fps-control span { color: #00ff88; font-weight: bold; min-width: 40px; }
        .info-panel {
            width: 100%;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #333;
        }
        .info-panel h2 { color: #00ff88; font-size: 0.9rem; margin-bottom: 12px; }
        .manos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .mano-card {
            background: #0f0f0f;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #333;
            text-align: center;
        }
        .mano-card .lado { font-size: 0.75rem; color: #00bfff; margin-bottom: 6px; }
        .mano-card .seña { font-size: 1.3rem; font-weight: bold; color: white; }
        .mano-card .confianza { font-size: 0.75rem; color: #aaa; margin-top: 4px; }
        .barra { width: 100%; background: #333; border-radius: 10px; height: 6px; margin-top: 8px; }
        .barra-fill { height: 6px; background: #00ff88; border-radius: 10px; transition: width 0.3s; }
        footer { padding: 16px; color: #555; font-size: 0.75rem; text-align: center; }
        video { display: none; }
    </style>
</head>
<body>
<header>
    <h1>TRADUCTOR DE SEÑAS</h1>
    <p>Detección  de señas en tiempo real con IA</p>
</header>

<div class="container">
    <div class="camara-box">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="live-badge">EN VIVO</div>
    </div>

    <div class="fps-control">
        <label>⚡ Velocidad:</label>
        <input type="range" id="fps-slider" min="2" max="15" value="6">
        <span id="fps-label">6 fps</span>
    </div>

    <div class="info-panel">
        <h2>📊 DETECCIÓN ACTUAL</h2>
        <div class="manos-grid">
            <div class="mano-card">
                <div class="lado">LEFT / IZQUIERDA 🤚</div>
                <div class="seña" id="seña-izq">—</div>
                <div class="confianza" id="conf-izq">Sin detección</div>
                <div class="barra"><div class="barra-fill" id="barra-izq" style="width:0%"></div></div>
            </div>
            <div class="mano-card">
                <div class="lado">RIGHT / DERECHA 🤚</div>
                <div class="seña" id="seña-der">—</div>
                <div class="confianza" id="conf-der">Sin detección</div>
                <div class="barra"><div class="barra-fill" id="barra-der" style="width:0%"></div></div>
            </div>
        </div>
    </div>
</div>

<footer>Proyecto de Titulación — Traductor LSM con IA</footer>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const slider = document.getElementById('fps-slider');
const fpsLabel = document.getElementById('fps-label');

let fps = 6;
slider.addEventListener('input', () => {
    fps = parseInt(slider.value);
    fpsLabel.textContent = fps + ' fps';
});

const CONEXIONES = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [0,9],[9,10],[10,11],[11,12],
    [0,13],[13,14],[14,15],[15,16],
    [0,17],[17,18],[18,19],[19,20],
    [5,9],[9,13],[13,17]
];

function dibujarMano(landmarks) {
    const w = canvas.width, h = canvas.height;
    const puntos = landmarks.map(p => [p[0] * w, p[1] * h]);
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth = 2;
    for (const [a, b] of CONEXIONES) {
        ctx.beginPath();
        ctx.moveTo(puntos[a][0], puntos[a][1]);
        ctx.lineTo(puntos[b][0], puntos[b][1]);
        ctx.stroke();
    }
    ctx.fillStyle = '#ffffff';
    for (const [x, y] of puntos) {
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();
    }
}

function dibujarBbox(bbox, seña, confianza) {
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth = 2;
    ctx.strokeRect(bbox.x1, bbox.y1, bbox.x2 - bbox.x1, bbox.y2 - bbox.y1);
    const texto = `${seña}: ${confianza}%`;
    ctx.font = 'bold 14px Segoe UI';
    const tw = ctx.measureText(texto).width;
    ctx.fillStyle = '#00ff88';
    ctx.fillRect(bbox.x1, bbox.y1 - 24, tw + 10, 22);
    ctx.fillStyle = '#000';
    ctx.fillText(texto, bbox.x1 + 5, bbox.y1 - 7);
}

function actualizarPanel(lado, info) {
    const sufijo = lado === 'izquierda' ? 'izq' : 'der';
    if (info) {
        document.getElementById(`seña-${sufijo}`).textContent = info.seña;
        document.getElementById(`conf-${sufijo}`).textContent = info.confianza + '%';
        document.getElementById(`barra-${sufijo}`).style.width = info.confianza + '%';
    } else {
        document.getElementById(`seña-${sufijo}`).textContent = '—';
        document.getElementById(`conf-${sufijo}`).textContent = 'Sin detección';
        document.getElementById(`barra-${sufijo}`).style.width = '0%';
    }
}

let procesando = false;

async function procesarFrame() {
    if (procesando || video.readyState < 2) return;
    procesando = true;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    // Comprimir frame al 40% de calidad para reducir datos enviados
    const frameB64 = canvas.toDataURL('image/jpeg', 0.4).split(',')[1];

    try {
        const res = await fetch('/predecir', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({frame: frameB64})
        });
        const data = await res.json();

        // Redibujar frame
        ctx.drawImage(video, 0, 0);

        for (const lado of ['izquierda', 'derecha']) {
            if (data[lado]) {
                dibujarMano(data[lado].landmarks);
                dibujarBbox(data[lado].bbox, data[lado].seña, data[lado].confianza);
            }
            actualizarPanel(lado, data[lado]);
        }
    } catch(e) {}

    procesando = false;
}

// Iniciar cámara
navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: {ideal: 320}, height: {ideal: 240} },
    audio: false
}).then(stream => {
    video.srcObject = stream;
    video.play();
    setInterval(() => procesarFrame(), 1000 / fps);
    // Actualizar intervalo cuando cambia el slider
    slider.addEventListener('change', () => {
        clearInterval(window._loop);
        window._loop = setInterval(() => procesarFrame(), 1000 / fps);
    });
});
</script>
</body>
</html>
